debug_wo_encoding: false
rot_augmentation: true
num_scenes: 25000
num_scenes_per_batch: 5 # make sure it is a multiple of the number of grippers (exclude z0 from the count)
run_name: "me-full"
project_name: "Full Model Integration"
seed: 12345
epochs: 500
save_every_epoch: 5

gripper: ["panda", "vx300", "dexee", "allegro", "shadow", "z0"]

trainer_cfg:
  total_steps: 10000
  warmup_steps: 100
  peak_lr: 0.0003
  init_lr: 0.0001
  end_lr: 0.00008

defaults:
  - _self_
  - algorithm: flow
  - globals: default
  - model: kinematics_flow
